<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILOS GENERALES Y LIMPIOS */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; background: #f4f4f4; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* BARRA SUPERIOR DE PESTAÑAS */
        .top-bar { display: flex; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #eee; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #555; display: flex; align-items: center; gap: 8px; }
        .tab-btn:hover { background: #ddd; }
        .tab-btn.active { background: #333; color: white; }
        .tab-btn-add { background: #007bff; color: white; }
        .tab-btn-add:hover { background: #0056b3; }
        
        /* OCULTAR/MOSTRAR SECCIONES */
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* FORMULARIOS Y TABLAS */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { margin-top: 15px; padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-save:hover { background: #218838; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { background: #333; color: white; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background: #c82333; }
        
        /* RESPONSIVO PARA CELULARES */
        @media (max-width: 768px) {
            thead { display: none; }
            tr { display: block; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; padding: 10px; }
            td { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; align-items: center; }
            td::before { content: attr(data-label); font-weight: bold; color: #555; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="pantalla-login" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #222; z-index: 10000; display: flex; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px;">
            <h2>🔐 Acceso a Gruken</h2>
            <input type="email" id="email-admin" placeholder="Correo" class="form-input" style="margin-bottom:10px;">
            <input type="password" id="pass-admin" placeholder="Contraseña" class="form-input" style="margin-bottom:15px;">
            <button onclick="iniciarSesion()" class="btn-save" style="margin-top:0;">Entrar al Inventario</button>
        </div>
    </div>

    <div class="container">
        
        <div class="top-bar">
            <button class="tab-btn active" onclick="cambiarPestana('vista-inventario', this)"><i class="fas fa-box"></i> Mi Inventario</button>
            <button class="tab-btn tab-btn-add" onclick="cambiarPestana('vista-agregar', this)"><i class="fas fa-plus"></i> Agregar Producto</button>
            <button class="tab-btn" onclick="cambiarPestana('vista-ventas', this)"><i class="fas fa-chart-line"></i> Ventas</button>
            <button class="tab-btn" onclick="cambiarPestana('vista-configuracion', this)"><i class="fas fa-cog"></i> Configuración</button>
        </div>

        <div id="vista-inventario" class="view-section active">
            <h3 style="margin-top:0;"><i class="fas fa-list"></i> Lista de Productos</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Talles</th>
                            <th>Colores</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-inventario">
                        <tr><td colspan="8">Cargando inventario...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

     <div id="vista-agregar" class="view-section">
            <h3 style="margin-top:0;"><i class="fas fa-plus-circle"></i> Datos del Producto</h3>
            <div class="form-grid">
                <div><label><b>ID (Ej: ART-01):</b></label><input type="text" id="prod-id" class="form-input" placeholder="Identificador único"></div>
                <div><label><b>Nombre:</b></label><input type="text" id="prod-nombre" class="form-input" placeholder="Ej: Buzo Osito"></div>
                <div><label><b>Talles:</b></label><input type="text" id="prod-talles" class="form-input" placeholder="Ej: S, M, L"></div>
                <div><label><b>Colores:</b></label><input type="text" id="prod-colores" class="form-input" placeholder="Ej: Rosa, Negro"></div>
                <div><label><b>Precio ($):</b></label><input type="number" id="prod-precio" class="form-input" placeholder="0.00"></div>
                <div style="grid-column: 1 / -1;"><label><b>URL de la Imagen:</b></label><input type="text" id="prod-img" class="form-input" placeholder="Ej: images/buzo.jpg"></div>
                
                <div style="grid-column: 1 / -1; margin-top: 10px;">
                    <button type="button" onclick="generarVariantes()" class="btn-save" style="background: #17a2b8;"><i class="fas fa-cogs"></i> Generar campos de Stock por Variante</button>
                </div>
                <div id="contenedor-variantes" style="grid-column: 1 / -1; display:flex; flex-direction:column; gap:10px; background: #f9f9f9; padding: 15px; border-radius: 8px;">
                    </div>
            </div>
            <button onclick="guardarProductoUnificado(event)" class="btn-save"><i class="fas fa-save"></i> Guardar Producto Final</button>
        </div>

        <div id="vista-ventas" class="view-section">
            <h3 style="margin-top:0;"><i class="fas fa-history"></i> Historial de Ventas</h3>
            <div style="overflow-x: auto;">
                <div id="tabla-historial-ventas">Cargando ventas...</div>
            </div>
        </div>

        <div id="vista-configuracion" class="view-section">
            <h3 style="margin-top:0;"><i class="fas fa-tools"></i> Ajustes Generales y Redes</h3>
            <div class="form-grid">
                <div><label>Nombre de la Página:</label><input type="text" id="config-nombre" class="form-input"></div>
                <div><label>Página Web (Link):</label><input type="text" id="config-web" class="form-input"></div>
                <div><label>Logo (Ruta):</label><input type="text" id="config-logo" class="form-input"></div>
                <div><label>Favicon (Icono pestaña):</label><input type="text" id="config-favicon" class="form-input"></div>
                <div><label>WhatsApp:</label><input type="text" id="config-wsp" class="form-input"></div>
                <div><label>Correo Electrónico:</label><input type="email" id="config-email" class="form-input"></div>
                <div><label>Enlace de TikTok:</label><input type="text" id="config-tiktok" class="form-input"></div>
                <div><label>Enlace de Facebook:</label><input type="text" id="config-facebook" class="form-input"></div>
                <div><label>Enlace de Instagram:</label><input type="text" id="config-instagram" class="form-input"></div>
                <div><label>Enlace de YouTube:</label><input type="text" id="config-youtube" class="form-input"></div>
            </div>
            <button onclick="guardarConfiguracion()" class="btn-save" style="background: #007bff;"><i class="fas fa-cloud-upload-alt"></i> Guardar Configuración</button>
        </div>

    </div>
     <script>
        // 1. CONEXIÓN A LA BASE DE DATOS
        const supabaseUrl = 'https://pvniwivsxluujijyqqpc.supabase.co';
        const supabaseKey = 'sb_publishable_ss0VcJwu1wR5OVrNn2aYUw_sGG4HiJh';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let productosGlobal = []; // Guardamos los productos aquí para poder editarlos fácil

        // DICCIONARIO DE COLORES PARA EL ADMIN
        const coloresHexAdmin = {
            'rosa': '#F791A6', 'beige': '#F5F5DC', 'denim': '#1560BD',
            'topo': '#8B8589', 'blanco': '#FFFFFF', 'negro': '#000000',
            'azul': '#007bff', 'verde': '#28a745', 'rojo': '#dc3545', 
            'gris': '#6c757d', 'amarillo': '#ffc107', 'celeste': '#17a2b8',
            'violeta': '#6f42c1', 'naranja': '#fd7e14', 'marron': '#8b4513'
        };

        // 2. SISTEMA DE LOGIN Y CARGA INICIAL
        async function iniciarSesion() {
            const email = document.getElementById('email-admin').value;
            const password = document.getElementById('pass-admin').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert("Acceso denegado ❌ Revisa tu correo o contraseña.");
            } else {
                document.getElementById('pantalla-login').style.display = 'none';
                cargarInventarioUnificado();
                cargarVentas();
                cargarConfiguracion();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            _supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    document.getElementById('pantalla-login').style.display = 'none';
                    cargarInventarioUnificado();
                    cargarVentas();
                    cargarConfiguracion();
                }
            });
        });

        // 3. FUNCIÓN PARA CAMBIAR ENTRE PESTAÑAS
        function cambiarPestana(idVista, btnElement) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(idVista).classList.add('active');
            if(btnElement) btnElement.classList.add('active');
        }

        // 4. LÓGICA DEL INVENTARIO (LEER Y MOSTRAR)
        async function cargarInventarioUnificado() {
            const { data, error } = await _supabase.from('productos').select('*').order('id', { ascending: true });
            const tbody = document.getElementById('cuerpo-inventario');
            
            if (error) {
                tbody.innerHTML = `<tr><td colspan="8" style="color:red;">Error: ${error.message}</td></tr>`;
                return;
            }

            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No tienes productos aún. ¡Ve a Agregar Producto!</td></tr>';
                return;
            }

            productosGlobal = data; // Guardamos en memoria
            tbody.innerHTML = ''; 

           data.forEach(prod => {
                // ---> ARREGLO DE LA MINI IMAGEN: Tomamos solo la primera foto <---
                let primeraImagen = '';
                if (prod.imagen) {
                    primeraImagen = prod.imagen.split(',')[0].trim();
                }

                // Generar bolitas de color para la tabla
                let coloresArray = (prod.colores || 'Único').split(',');
                let htmlColoresVisibles = coloresArray.map(c => {
                    let clave = c.trim().toLowerCase();
                    let fondo = coloresHexAdmin[clave] || '#eeeeee';
                    return `<span title="${c.trim()}" style="display:inline-block; width:15px; height:15px; background-color:${fondo}; border:1px solid #ccc; border-radius:50%; margin-right:3px; vertical-align:middle;"></span> ${c.trim()}`;
                }).join('<br>');

                const tr = document.createElement('tr');
                // Ahora usamos ${primeraImagen} y le agregué height="40" para que sean cuadraditas perfectas
                tr.innerHTML = `
                    <td data-label="Imagen"><img src="${primeraImagen}" width="40" height="40" style="border-radius: 5px; border: 1px solid #ddd; object-fit: cover;"></td>
                    <td data-label="ID"><b>${prod.id}</b></td>
                    <td data-label="Nombre">${prod.nombre || ''}</td>
                    <td data-label="Talles">${prod.talles || ''}</td>
                    <td data-label="Colores">${htmlColoresVisibles}</td>
                    <td data-label="Stock"><b>${prod.stock || 0}</b></td>
                    <td data-label="Precio">$${(prod.precio || 0).toLocaleString()}</td>
                    <td data-label="Acciones" style="display: flex; gap: 5px; flex-direction: column;">
                        <button onclick="cargarParaEditar('${prod.id}')" class="btn-save" style="margin-top:0; padding: 6px; font-size: 14px; background: #ffc107; color: #333;"><i class="fas fa-sync-alt"></i> Actualizar</button>
                        <button onclick="eliminarProducto('${prod.id}')" class="btn-delete" title="Eliminar producto" style="width: 100%;"><i class="fas fa-trash"></i> Eliminar</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

       // -----------------------------------------------------------------
        // NUEVO: CARGAR DATOS PARA EDITAR (CON VARIANTES)
        // -----------------------------------------------------------------
        window.cargarParaEditar = async function(idProd) {
            // 1. Buscamos los datos básicos del producto en la base de datos
            const { data: producto, error } = await _supabase.from('productos').select('*').eq('id', idProd).single();
            if (error) { alert("Error al cargar producto: " + error.message); return; }

            // 2. Buscamos el stock de sus variantes
            const { data: variantes, error: errVar } = await _supabase.from('productos_variantes').select('*').eq('producto_id', idProd);

            // 3. Llenamos el formulario con los datos
            document.getElementById('prod-id').value = producto.id || '';
            document.getElementById('prod-id').disabled = true; // Bloqueamos el ID para no romper nada
            document.getElementById('prod-nombre').value = producto.nombre || '';
            document.getElementById('prod-talles').value = producto.talles || '';
            document.getElementById('prod-colores').value = producto.colores || '';
            document.getElementById('prod-precio').value = producto.precio || 0;
            document.getElementById('prod-img').value = producto.imagen || '';

            // 4. Armamos la tablita de stock con las variantes recuperadas
            const contenedor = document.getElementById('contenedor-variantes');
            if (variantes && variantes.length > 0) {
                let html = `<h4 style="margin:0 0 10px 0;">Stock actual por combinación:</h4>
                            <table style="width:100%; max-width: 400px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                            <tr><th>Talle</th><th>Color</th><th>Stock</th></tr>`;
                
                variantes.forEach(v => {
                    html += `
                    <tr>
                        <td><b>${v.talle}</b></td>
                        <td><b>${v.color}</b></td>
                        <td><input type="number" class="input-variante-stock" data-talle="${v.talle}" data-color="${v.color}" value="${v.stock}" style="width: 80px; padding: 5px; border:1px solid #ccc; border-radius:4px;"></td>
                    </tr>`;
                });
                html += `</table>`;
                contenedor.innerHTML = html;
            } else {
                contenedor.innerHTML = '<p style="color:#d9534f;">No hay stock detallado. Haz clic en "Generar campos..."</p>';
            }

            // Nos movemos a la pestaña de agregar/editar
            cambiarPestana('vista-agregar', document.querySelectorAll('.tab-btn')[1]);
            window.scrollTo(0, 0);
        };
// 5. LÓGICA DEL INVENTARIO (GUARDAR NUEVO O EDITAR)
      // -----------------------------------------------------------------
        // NUEVO: FUNCIÓN PARA GENERAR LOS INPUTS DE STOCK POR VARIANTE
        // -----------------------------------------------------------------
        function generarVariantes() {
            // Leemos los talles y colores y los separamos por las comas
            const talles = document.getElementById('prod-talles').value.split(',').map(t => t.trim()).filter(t => t !== '');
            const colores = document.getElementById('prod-colores').value.split(',').map(c => c.trim()).filter(c => c !== '');
            const contenedor = document.getElementById('contenedor-variantes');
            
            if(talles.length === 0 || colores.length === 0) {
                alert("Por favor, ingresa al menos un talle y un color separados por coma antes de generar las variantes.");
                return;
            }

            let html = `<h4 style="margin:0 0 10px 0;">Define el stock para cada combinación:</h4>
                        <table style="width:100%; max-width: 400px; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
                        <tr><th>Talle</th><th>Color</th><th>Stock</th></tr>`;
            
            talles.forEach(talle => {
                colores.forEach(color => {
                    html += `
                    <tr>
                        <td><b>${talle}</b></td>
                        <td><b>${color}</b></td>
                        <td><input type="number" class="input-variante-stock" data-talle="${talle}" data-color="${color}" value="0" style="width: 80px; padding: 5px; border:1px solid #ccc; border-radius:4px;"></td>
                    </tr>`;
                });
            });
            html += `</table>`;
            contenedor.innerHTML = html;
        }

        // -----------------------------------------------------------------
        // ACTUALIZADO: GUARDAR PRODUCTO + SUS VARIANTES
        // -----------------------------------------------------------------
        async function guardarProductoUnificado(evento) {
            if (evento) evento.preventDefault(); 

            const idTexto = document.getElementById('prod-id').value;
            if (!idTexto) { alert("¡Por favor, escribe un ID para el producto!"); return; }

            const inputsVariantes = document.querySelectorAll('.input-variante-stock');
            if (inputsVariantes.length === 0) {
                alert("Por favor, haz clic en 'Generar campos de Stock por Variante' y define las cantidades.");
                return;
            }

            // Calculamos el stock total sumando todas las variantes
            let stockTotal = 0;
            const variantesAGuardar = [];

            inputsVariantes.forEach(input => {
                const cantidad = parseInt(input.value) || 0;
                stockTotal += cantidad;
                variantesAGuardar.push({
                    producto_id: idTexto, // Usamos el ID de texto directamente
                    talle: input.getAttribute('data-talle'),
                    color: input.getAttribute('data-color'),
                    stock: cantidad
                });
            });

            const productoGuardar = {
                id: idTexto, // Ahora guardamos como texto (ej: ART-01)
                nombre: document.getElementById('prod-nombre').value,
                talles: document.getElementById('prod-talles').value,
                colores: document.getElementById('prod-colores').value,
                stock: stockTotal, // Guardamos el total sumado como referencia
                precio: parseFloat(document.getElementById('prod-precio').value) || 0,
                imagen: document.getElementById('prod-img').value
            };

            // 1. Guardar el producto principal en la tabla "productos"
            const { error: errorProd } = await _supabase.from('productos').upsert(productoGuardar);
            if (errorProd) { alert("Error al guardar producto: " + errorProd.message); return; }

            // 2. Por si estamos actualizando un producto viejo, borramos sus variantes anteriores
            await _supabase.from('productos_variantes').delete().eq('producto_id', idTexto);

            // 3. Guardar todas las nuevas variantes en la tabla "productos_variantes"
            const { error: errorVar } = await _supabase.from('productos_variantes').insert(variantesAGuardar);
            if (errorVar) { alert("Error al guardar el stock detallado: " + errorVar.message); return; }

            alert("✅ ¡Producto y stock detallado guardados correctamente!");
            
            // Limpiamos los campos para el próximo producto
            document.querySelectorAll('#vista-agregar .form-input').forEach(input => input.value = '');
            document.getElementById('prod-id').disabled = false;  // <--- AGREGAR ESTA LÍNEA AQUÍ
            document.getElementById('contenedor-variantes').innerHTML = ''; 
            cargarInventarioUnificado(); 
            cambiarPestana('vista-inventario', document.querySelectorAll('.tab-btn')[0]); 
        }
        // 6. LÓGICA DEL INVENTARIO (ELIMINAR)
        async function eliminarProducto(idProd) {
            if (confirm(`¿Estás seguro de eliminar el producto: ${idProd}?`)) {
                const { error } = await _supabase.from('productos').delete().eq('id', idProd);
                if (error) alert("Error al eliminar: " + error.message);
                else cargarInventarioUnificado();
            }
        }

        // 7. LÓGICA DE CONFIGURACIÓN DE LA TIENDA
        async function cargarConfiguracion() {
            const { data, error } = await _supabase.from('configuracion').select('*').eq('id', 1).single();
            if (data) {
                document.getElementById('config-nombre').value = data.nombre || '';
                document.getElementById('config-logo').value = data.logo || '';
                document.getElementById('config-wsp').value = data.wsp || '';
                document.getElementById('config-email').value = data.email || '';
                document.getElementById('config-favicon').value = data.favicon || '';
                document.getElementById('config-web').value = data.web || '';
                document.getElementById('config-tiktok').value = data.tiktok || '';
                document.getElementById('config-facebook').value = data.facebook || '';
                document.getElementById('config-instagram').value = data.instagram || '';
                document.getElementById('config-youtube').value = data.youtube || '';
            }
        }

        async function guardarConfiguracion() {
            const config = {
                id: 1, 
                nombre: document.getElementById('config-nombre').value,
                logo: document.getElementById('config-logo').value,
                wsp: document.getElementById('config-wsp').value,
                email: document.getElementById('config-email').value,
                favicon: document.getElementById('config-favicon').value,
                web: document.getElementById('config-web').value,
                tiktok: document.getElementById('config-tiktok').value,
                facebook: document.getElementById('config-facebook').value,
                instagram: document.getElementById('config-instagram').value,
                youtube: document.getElementById('config-youtube').value
            };
            const { error } = await _supabase.from('configuracion').upsert(config);
            if (error) alert('Error al guardar: ' + error.message);
            else alert('✅ ¡Configuración guardada en el servidor!');
        }

        // 8. LÓGICA DE VENTAS
        async function cargarVentas() {
            const { data, error } = await _supabase.from('ventas').select('*').order('id', { ascending: false });
            const divVentas = document.getElementById('tabla-historial-ventas');
            if (error || !data || data.length === 0) {
                divVentas.innerHTML = "<p>Aún no hay ventas registradas.</p>"; return;
            }
            let html = `<table><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Total</th></tr></thead><tbody>`;
            data.forEach((v) => {
                let fecha = v.created_at ? new Date(v.created_at).toLocaleDateString() : 'N/A';
                html += `<tr>
                    <td data-label="ID Venta">#${v.id}</td><td data-label="Fecha">${fecha}</td>
                    <td data-label="Cliente"><strong>${v.cliente || 'Anónimo'}</strong></td>
                    <td data-label="Total">$${(v.total || 0).toLocaleString('es-AR')}</td>
                </tr>`;
            });
            divVentas.innerHTML = html + '</tbody></table>';
        }
    </script>
</body>
</html>
