<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILOS GENERALES Y LIMPIOS */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; background: #f4f4f4; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* BARRA SUPERIOR DE PESTAÑAS */
        .top-bar { display: flex; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #eee; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; color: #555; display: flex; align-items: center; gap: 8px; }
        .tab-btn:hover { background: #ddd; }
        .tab-btn.active { background: #333; color: white; }
        .tab-btn-add { background: #007bff; color: white; }
        
        /* SECCIONES */
        .view-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* FORMULARIOS */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .form-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-save { margin-top: 15px; padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn-save:hover { background: #218838; }
        
        /* TABLAS */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        th { background: #333; color: white; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }

        /* PREVISUALIZACIÓN DE FOTOS */
        #contenedor-previsualizacion { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .foto-preview { position: relative; width: 80px; height: 80px; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; }
        .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
        .foto-preview .btn-sacar { position: absolute; top: 0; right: 0; background: rgba(255,0,0,0.8); color: white; border: none; font-size: 12px; cursor: pointer; padding: 2px 5px; }

        /* VISTA MÓVIL OPTIMIZADA (TABLA INVENTARIO) */
        @media (max-width: 768px) {
            thead { display: none; }
            tr { display: block; background: skyblue; color: #fff; margin-bottom: 15px; padding: 10px; border-radius: 12px; }
            td { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 8px 0; }
            td::before { content: attr(data-label); font-weight: bold; }
        }
    </style>
</head>
<body>

    <div id="pantalla-login" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #222; z-index: 10000; display: flex; justify-content: center; align-items: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px;">
            <h2 style="margin-bottom: 20px;">🔐 Acceso al Sistema</h2>
            <input type="email" id="email-admin" placeholder="Correo electrónico" class="form-input" style="margin-bottom:10px;">
            <input type="password" id="pass-admin" placeholder="Contraseña" class="form-input" style="margin-bottom:15px;">
            <button onclick="iniciarSesion()" class="btn-save" style="margin-top:0;">Ingresar</button>
        </div>
    </div>

    <div class="container">
        <div class="top-bar">
            <button class="tab-btn active" onclick="cambiarPestana('vista-inventario', this)"><i class="fas fa-box"></i> Inventario</button>
            <button class="tab-btn tab-btn-add" onclick="cambiarPestana('vista-agregar', this)"><i class="fas fa-plus"></i> Agregar Producto</button>
            <button class="tab-btn" onclick="cambiarPestana('vista-ventas', this)"><i class="fas fa-chart-line"></i> Ventas</button>
            <button class="tab-btn" onclick="cambiarPestana('vista-configuracion', this)"><i class="fas fa-cog"></i> Ajustes</button>
        </div>

        <div id="vista-inventario" class="view-section active">
            <h3 style="margin-top:0;"><i class="fas fa-list"></i> Lista de Productos</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Imagen</th>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Stock</th>
                            <th>Precio</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpo-inventario"></tbody>
                </table>
            </div>
        </div>

        <div id="vista-agregar" class="view-section">
            <h3 style="margin-top:0;"><i class="fas fa-plus-circle"></i> Datos del Producto</h3>
            <div class="form-grid">
                <div><label><b>ID (Ej: ART-01):</b></label><input type="text" id="prod-id" class="form-input"></div>
                <div><label><b>Nombre:</b></label><input type="text" id="prod-nombre" class="form-input"></div>
                <div><label><b>Talles (Ej: S, M, L):</b></label><input type="text" id="prod-talles" class="form-input" placeholder="S, M, L"></div>
                <div><label><b>Colores (Ej: Rosa, Negro):</b></label><input type="text" id="prod-colores" class="form-input" placeholder="Rosa, Negro"></div>
                <div><label><b>Precio ($):</b></label><input type="number" id="prod-precio" class="form-input"></div>
                
                <div style="grid-column: 1 / -1; background: #f9f9f9; border: 2px dashed #ccc; padding: 15px; border-radius: 8px;">
                    <label><b>📸 Seleccionar Fotos desde el Celular:</b></label><br>
                    <input type="file" id="input-fotos" class="form-input" multiple accept="image/*" style="margin-top:10px; border:none; background:transparent;">
                    <div id="contenedor-previsualizacion"></div>
                    <input type="hidden" id="prod-img"> 
                </div>

                <div style="grid-column: 1 / -1; margin-top: 10px;">
                    <button onclick="generarVariantes()" class="btn-save" style="background: #17a2b8;"><i class="fas fa-cogs"></i> Generar campos de Stock por Variante</button>
                </div>

                <div id="contenedor-variantes" style="grid-column: 1 / -1; display:flex; flex-direction:column; gap:10px;"></div>
            </div>
            <button id="btn-finalizar" onclick="guardarProductoUnificado(event)" class="btn-save"><i class="fas fa-save"></i> Guardar Producto Final</button>
        </div>

        <div id="vista-ventas" class="view-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0;"><i class="fas fa-history"></i> Historial de Ventas</h3>
                <button onclick="descargarExcelVentas()" style="background: #1d6f42; color: white; padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;"><i class="fas fa-file-excel"></i> Descargar Excel</button>
            </div>
            <div id="tabla-historial-ventas" style="overflow-x: auto;">Cargando ventas...</div>
        </div>

        <div id="vista-configuracion" class="view-section">
            <h3 style="margin-top:0;"><i class="fas fa-tools"></i> Ajustes Generales</h3>
            <div class="form-grid">
                <div><label><b>Nombre de la Tienda:</b></label><input type="text" id="config-nombre" class="form-input"></div>
                <div><label><b>URL Logo:</b></label><input type="text" id="config-logo" class="form-input"></div>
                <div><label><b>WhatsApp (con código):</b></label><input type="text" id="config-wsp" class="form-input"></div>
                <div><label><b>Email:</b></label><input type="text" id="config-email" class="form-input"></div>
                <div><label><b>Favicon:</b></label><input type="text" id="config-favicon" class="form-input"></div>
                <div><label><b>Web:</b></label><input type="text" id="config-web" class="form-input"></div>
                <div><label><b>TikTok:</b></label><input type="text" id="config-tiktok" class="form-input"></div>
                <div><label><b>Facebook:</b></label><input type="text" id="config-facebook" class="form-input"></div>
                <div><label><b>Instagram:</b></label><input type="text" id="config-instagram" class="form-input"></div>
                <div><label><b>YouTube:</b></label><input type="text" id="config-youtube" class="form-input"></div>
            </div>
            <button onclick="guardarConfiguracion()" class="btn-save" style="background: #007bff;"><i class="fas fa-cloud-upload-alt"></i> Guardar Configuración en Servidor</button>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓN SUPABASE
        const supabaseUrl = 'https://pvniwivsxluujijyqqpc.supabase.co';
        const supabaseKey = 'sb_publishable_ss0VcJwu1wR5OVrNn2aYUw_sGG4HiJh';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let fotosSeleccionadas = [];

        // 2. INICIO DE SESIÓN
        async function iniciarSesion() {
            const email = document.getElementById('email-admin').value;
            const password = document.getElementById('pass-admin').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert("Acceso Denegado ❌"); 
            else location.reload();
        }

        document.addEventListener('DOMContentLoaded', () => {
            _supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    document.getElementById('pantalla-login').style.display = 'none';
                    cargarInventarioUnificado();
                    cargarVentas();
                    cargarConfiguracion();
                }
            });
        });

        // 3. CAMBIO DE PESTAÑAS
        function cambiarPestana(id, btn) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        // 4. LÓGICA DE FOTOS (SUBIR Y PREVISUALIZAR)
        document.getElementById('input-fotos').addEventListener('change', function(e) {
            const archivos = Array.from(e.target.files);
            archivos.forEach(file => {
                fotosSeleccionadas.push(file);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const div = document.createElement('div');
                    div.className = 'foto-preview';
                    div.innerHTML = `
                        <img src="${event.target.result}">
                        <button type="button" class="btn-sacar" onclick="eliminarFotoSeleccionada(this, '${file.name}')">✕</button>
                    `;
                    document.getElementById('contenedor-previsualizacion').appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        function eliminarFotoSeleccionada(btn, nombre) {
            fotosSeleccionadas = fotosSeleccionadas.filter(f => f.name !== nombre);
            btn.parentElement.remove();
        }

        async function subirFotosASupabase() {
            const linksSubidos = [];
            for (const file of fotosSeleccionadas) {
                const nombreLimpio = `${Date.now()}-${file.name.replace(/\s+/g, '_')}`;
                const { data, error } = await _supabase.storage
                    .from('productos')
                    .upload(`fotos/${nombreLimpio}`, file);

                if (error) {
                    console.error("Error subiendo foto:", error);
                } else {
                    const { data: publicUrl } = _supabase.storage.from('productos').getPublicUrl(`fotos/${nombreLimpio}`);
                    linksSubidos.push(publicUrl.publicUrl);
                }
            }
            return linksSubidos.join(',');
        }

        // 5. LÓGICA DEL INVENTARIO (CARGAR, GENERAR VARIANTES, GUARDAR)
        async function cargarInventarioUnificado() {
            const { data, error } = await _supabase.from('productos').select('*').order('id', { ascending: true });
            const tbody = document.getElementById('cuerpo-inventario');
            tbody.innerHTML = '';

            if (data) {
                data.forEach(p => {
                    const fotoLink = p.imagen ? p.imagen.split(',')[0] : 'images/default.jpg';
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td data-label="Imagen"><img src="${fotoLink}" width="50" height="50" style="object-fit:cover; border-radius:8px;"></td>
                        <td data-label="ID">${p.id}</td>
                        <td data-label="Nombre">${p.nombre}</td>
                        <td data-label="Stock">${p.stock}</td>
                        <td data-label="Precio">$${p.precio.toLocaleString()}</td>
                        <td data-label="Acciones">
                            <button onclick="editarProducto('${p.id}')" style="background:#ffc107; color:black; border:none; padding:8px; border-radius:4px; margin-right:5px;"><i class="fas fa-edit"></i></button>
                            <button onclick="eliminarProducto('${p.id}')" class="btn-delete"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function generarVariantes() {
            const talles = document.getElementById('prod-talles').value.split(',').map(t => t.trim()).filter(t => t !== '');
            const colores = document.getElementById('prod-colores').value.split(',').map(c => c.trim()).filter(c => c !== '');
            const contenedor = document.getElementById('contenedor-variantes');
            
            if (talles.length === 0 || colores.length === 0) {
                alert("Primero escribe los talles y colores separados por coma.");
                return;
            }

            let html = `
                <table style="width:100%; margin-top:10px; border:1px solid #ddd; background:white;">
                    <thead><tr><th>Talle</th><th>Color</th><th>Stock</th></tr></thead>
                    <tbody>`;
            
            talles.forEach(t => {
                colores.forEach(c => {
                    html += `
                        <tr>
                            <td>${t}</td>
                            <td>${c}</td>
                            <td><input type="number" class="input-variante-stock" data-talle="${t}" data-color="${c}" value="0" style="width:70px; padding:5px;"></td>
                        </tr>`;
                });
            });
            html += `</tbody></table>`;
            contenedor.innerHTML = html;
        }

        async function guardarProductoUnificado(evento) {
            if (evento) evento.preventDefault();

            const idTexto = document.getElementById('prod-id').value;
            if (!idTexto) { alert("¡Por favor, escribe un ID!"); return; }

            const btn = document.getElementById('btn-finalizar');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = "Procesando... ⏳";
            btn.disabled = true;

            try {
                // 1. Subir fotos nuevas si existen
                let linksDeFotos = document.getElementById('prod-img').value;
                if (fotosSeleccionadas.length > 0) {
                    const nuevosLinks = await subirFotosASupabase();
                    linksDeFotos = linksDeFotos ? linksDeFotos + ',' + nuevosLinks : nuevosLinks;
                }

                // 2. Procesar variantes
                const inputsVariantes = document.querySelectorAll('.input-variante-stock');
                let stockTotal = 0;
                const variantesAGuardar = [];

                inputsVariantes.forEach(input => {
                    const cantidad = parseInt(input.value) || 0;
                    stockTotal += cantidad;
                    variantesAGuardar.push({
                        producto_id: idTexto,
                        talle: input.getAttribute('data-talle'),
                        color: input.getAttribute('data-color'),
                        stock: cantidad
                    });
                });

                // 3. Guardar Producto
                const { error: errorProd } = await _supabase.from('productos').upsert({
                    id: idTexto,
                    nombre: document.getElementById('prod-nombre').value,
                    talles: document.getElementById('prod-talles').value,
                    colores: document.getElementById('prod-colores').value,
                    stock: stockTotal,
                    precio: parseFloat(document.getElementById('prod-precio').value) || 0,
                    imagen: linksDeFotos
                });
                if (errorProd) throw errorProd;

                // 4. Guardar Variantes (borramos previas y subimos nuevas)
                await _supabase.from('productos_variantes').delete().eq('producto_id', idTexto);
                await _supabase.from('productos_variantes').insert(variantesAGuardar);

                alert("✅ Producto Guardado!");
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            }
        }

        async function eliminarProducto(idProd) {
            if (confirm(`¿Eliminar ${idProd}?`)) {
                await _supabase.from('productos').delete().eq('id', idProd);
                cargarInventarioUnificado();
            }
        }

        async function editarProducto(idProd) {
            const { data: p } = await _supabase.from('productos').select('*').eq('id', idProd).single();
            if (p) {
                document.getElementById('prod-id').value = p.id;
                document.getElementById('prod-id').disabled = true;
                document.getElementById('prod-nombre').value = p.nombre;
                document.getElementById('prod-talles').value = p.talles;
                document.getElementById('prod-colores').value = p.colores;
                document.getElementById('prod-precio').value = p.precio;
                document.getElementById('prod-img').value = p.imagen;
                
                // Cargar variantes existentes
                const { data: vars } = await _supabase.from('productos_variantes').select('*').eq('producto_id', idProd);
                generarVariantes();
                if (vars) {
                    vars.forEach(v => {
                        const input = document.querySelector(`.input-variante-stock[data-talle="${v.talle}"][data-color="${v.color}"]`);
                        if (input) input.value = v.stock;
                    });
                }
                cambiarPestana('vista-agregar', document.querySelector('.tab-btn-add'));
            }
        }

        // 6. VENTAS Y CONFIGURACIÓN
        async function cargarVentas() {
            const { data: ventas, error } = await _supabase.from('ventas').select('*').order('id', { ascending: false });
            const div = document.getElementById('tabla-historial-ventas');
            if (!ventas || ventas.length === 0) {
                div.innerHTML = "<p>No hay ventas.</p>";
                return;
            }
            window.ventasGlobal = ventas;
            let html = `<table><thead><tr><th>ID</th><th>Fecha</th><th>Cliente</th><th>Productos</th><th>Pago</th><th>Total</th></tr></thead><tbody>`;
            ventas.forEach(v => {
                let articulos = "Sin detalles";
                try {
                    let lista = typeof v.articulos === 'string' ? JSON.parse(v.articulos) : v.articulos;
                    articulos = lista.map(p => `• ${p.cantidad}x ${p.titulo} (${p.talla}/${p.color})`).join('<br>');
                } catch(e) {}
                html += `<tr><td>${v.id}</td><td>${new Date(v.created_at).toLocaleString()}</td><td>${v.nombre || v.cliente}</td><td>${articulos}</td><td>${v.forma_pago}</td><td>$${v.total}</td></tr>`;
            });
            div.innerHTML = html + "</tbody></table>";
        }

        function descargarExcelVentas() {
            if (!window.ventasGlobal) return;
            const datos = window.ventasGlobal.map(v => ({
                ID: v.id, Fecha: new Date(v.created_at).toLocaleString(), Cliente: v.nombre || v.cliente, Total: v.total, Pago: v.forma_pago
            }));
            const ws = XLSX.utils.json_to_sheet(datos);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Ventas");
            XLSX.writeFile(wb, `Ventas_Gruken_${new Date().toLocaleDateString()}.xlsx`);
        }

        async function cargarConfiguracion() {
            const { data } = await _supabase.from('configuracion').select('*').eq('id', 1).single();
            if (data) {
                Object.keys(data).forEach(key => {
                    const input = document.getElementById(`config-${key}`);
                    if (input) input.value = data[key];
                });
            }
        }

        async function guardarConfiguracion() {
            const config = { id: 1 };
            document.querySelectorAll('#vista-configuracion .form-input').forEach(input => {
                const key = input.id.replace('config-', '');
                config[key] = input.value;
            });
            await _supabase.from('configuracion').upsert(config);
            alert("✅ Ajustes Guardados!");
        }
    </script>
</body>
</html>
