<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Gruken</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    
    <style>
        /* ESTILOS MODERNIZADOS */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            margin: 0;
            padding: 10px;
        }
        
        .checkout-container { 
            max-width: 600px; /* Un poco más angosto para que se vea como una tarjeta elegante */
            margin: 40px auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        @media (max-width: 768px) {
            .checkout-container { 
                margin: 10px auto; 
                padding: 20px; 
            }
        }

        h1, h2, h3 { color: #111; }
        
        .resumen-pedido { 
            background: #f8fcfb; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border: 1px solid #e0eaea; 
        }
        
        .resumen-pedido h3 { margin-top: 0; font-size: 1.2em; }
        .resumen-pedido ul { list-style: none; padding: 0; margin: 0; }
        .resumen-pedido li { 
            margin-bottom: 10px; 
            border-bottom: 1px dashed #ddd; 
            padding-bottom: 10px; 
            font-size: 0.95em;
            color: #555;
        }
        .resumen-pedido li:last-child { border-bottom: none; }
        
        .total-destacado {
            font-size: 1.3em;
            font-weight: 600;
            color: #000;
            margin-top: 15px;
            text-align: right;
        }

        /* Estilos del Formulario */
        .form-group { margin-bottom: 18px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            font-size: 0.9em;
            color: #444;
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #d1d9e6; 
            border-radius: 10px; 
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            box-sizing: border-box;
            background-color: #fafbfc;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #009ee3;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 158, 227, 0.1);
        }

        /* Botón Mercado Pago Moderno */
        .btn-mp { 
            background-color: #009ee3; 
            color: white; 
            padding: 16px 20px; 
            border: none; 
            width: 100%; 
            cursor: pointer; 
            font-size: 1.1em; 
            font-weight: 600; 
            border-radius: 10px;
            transition: background 0.3s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 158, 227, 0.3);
        }
        .btn-mp:hover { 
            background-color: #007eb5; 
            transform: translateY(-2px);
        }
        .btn-mp:disabled { 
            background-color: #a0a0a0; 
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }
        
        .pago-seguro {
            text-align: center;
            font-size: 0.85em;
            color: #666;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        
        <h1 style="text-align: center; margin-top: 0; font-size: 1.8em;">Finalizar Compra</h1>
        
        <div class="resumen-pedido" id="resumen-final">
            </div>
         
        <h2 onclick="toggleDatosEnvio()" style="text-align: center; cursor: pointer; background: #111; color: white; padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 1.2em; font-weight: 500; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
            📍 Cargar Datos de Envío <span id="flecha-envio">▼</span>
        </h2>

        <form id="formulario-pedido" style="display: none; padding-top: 25px;">
            
            <div class="form-group">
                <label>Nombre y apellido / Razón social:</label>
                <input type="text" id="nombre" required placeholder="Ej: Maria Gonzalez">
            </div>
            
            <div class="form-group">
                <label>Provincia:</label>
                <select id="provincia" required>
                    <option value="">- Selecciona tu provincia -</option>
                    <option value="B">BUENOS AIRES</option>
                    <option value="C">CAPITAL FEDERAL</option>
                    <option value="K">CATAMARCA</option>
                    <option value="H">CHACO</option>
                    <option value="U">CHUBUT</option>
                    <option value="X">CORDOBA</option>
                    <option value="W">CORRIENTES</option>
                    <option value="E">ENTRE RIOS</option>
                    <option value="P">FORMOSA</option>
                    <option value="Y">JUJUY</option>
                    <option value="L">LA PAMPA</option>
                    <option value="F">LA RIOJA</option>
                    <option value="M">MENDOZA</option>
                    <option value="N">MISIONES</option>
                    <option value="Q">NEUQUEN</option>
                    <option value="R">RIO NEGRO</option>
                    <option value="A">SALTA</option>
                    <option value="J">SAN JUAN</option>
                    <option value="D">SAN LUIS</option>
                    <option value="Z">SANTA CRUZ</option>
                    <option value="S">SANTA FE</option>
                    <option value="G">SANTIAGO DEL ESTERO</option>
                    <option value="V">TIERRA DEL FUEGO</option>
                    <option value="T">TUCUMAN</option>
                </select>
            </div>
            
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 2;">
                    <label>Localidad:</label>
                    <input type="text" id="localidad" required placeholder="Ej: Temperley">
                </div>
                <div style="flex: 1;">
                    <label>C.P.:</label>
                    <input type="text" id="cp" required placeholder="Ej: 1834">
                </div>
            </div>
            
            <div class="form-group">
                <label>Dirección (Calle, Altura, Piso y Dpto):</label>
                <input type="text" id="direccion" required placeholder="Ej: Av. Rivadavia 123">
            </div>
            
            <div class="form-group">
                <label>Correo Electrónico:</label>
                <input type="email" id="email" required placeholder="Ej: nombre@correo.com">
            </div>
            
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Cód. Área:</label>
                    <input type="number" id="cod-area" required placeholder="Sin 0">
                </div>
                <div style="flex: 2;">
                    <label>Celular:</label>
                    <input type="number" id="celular" required placeholder="Sin 15">
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 35px; margin-bottom: 10px;">
                <button type="submit" id="boton-accion" class="btn-mp">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    Pagar con Mercado Pago
                </button>
                <div class="pago-seguro">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#009ee3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Pago seguro y encriptado
                </div>
            </div>

            <div id="walletPoint"></div>
        </form>
    </div>

   <script>
        const supabaseUrl = 'https://pvniwivsxluujijyqqpc.supabase.co';
        const supabaseKey = 'sb_publishable_ss0VcJwu1wR5OVrNn2aYUw_sGG4HiJh';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        
        const mp = new MercadoPago('APP_USR-790c84f2-956e-4fc8-ab25-bbaed5aea23b', {
            locale: 'es-AR'
        });

        const resumenDiv = document.querySelector('#resumen-final');
        let carrito = JSON.parse(localStorage.getItem('carrito_gruken')) || [];
        let total = 0;
        let totalConDescuentoGlobal = 0; // Guardamos esto global para pasarlo a MercadoPago

        document.addEventListener('DOMContentLoaded', () => {
            renderizarResumen();
        });

        // FUNCION DEL ACORDEON CON AUTO-SCROLL
        function toggleDatosEnvio() {
            const formulario = document.getElementById('formulario-pedido');
            const flecha = document.getElementById('flecha-envio');
            
            if (formulario.style.display === 'none') {
                formulario.style.display = 'block';
                flecha.innerHTML = '▲';

                setTimeout(() => {
                    formulario.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);

            } else {
                formulario.style.display = 'none';
                flecha.innerHTML = '▼';
            }
        }

       function renderizarResumen() {
            if(carrito.length === 0) {
                resumenDiv.innerHTML = "<p style='text-align:center;'>Tu carrito está vacío. <br><br><a href='index.html' style='color:#009ee3; text-decoration:none; font-weight:bold;'>Volver a la tienda</a></p>";
                document.querySelector('.btn-mp').disabled = true;
                return;
            }

            total = 0;
            let html = `<h3 style="margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Detalle de tu compra:</h3><ul>`;
            
            carrito.forEach(p => {
                const subtotal = parseInt(p.precio) * p.cantidad;
                html += `<li>
                            <b>${p.cantidad}x</b> ${p.titulo} 
                            <br><small style="color: #666;">Color: ${p.color} | Talle: ${p.talla}</small> 
                            <span style="float:right; font-weight: 500;">$${subtotal.toLocaleString('es-AR')}</span>
                         </li>`;
                total += subtotal;
            });

            // ==========================================
            // CÁLCULO MÁGICO DE PREMIOS EN EL CHECKOUT
            // ==========================================
            let cupon = localStorage.getItem('gruken_cupon') || "";
            let descuentoPorcentaje = 0;
            let textoCupon = "";

            if (cupon === "GRUKEN15") { descuentoPorcentaje = 0.15; textoCupon = "15% OFF"; }
            else if (cupon === "GRUKEN10") { descuentoPorcentaje = 0.10; textoCupon = "10% OFF"; }
            else if (cupon === "ENVIOFREE") { textoCupon = "Envío Gratis"; }

            // Revisamos si tiene el Envío VIP activo por tiempo
            let promoVIPActiva = localStorage.getItem('gruken_promo_fin') && Date.now() < parseInt(localStorage.getItem('gruken_promo_fin'));

            let montoDescuento = total * descuentoPorcentaje;
            totalConDescuentoGlobal = total - montoDescuento;

            // Inyectamos un CSS rápido y local para el latido aquí mismo
            html += `
            <style>
                @keyframes latidoCheckout {
                    0% { transform: scale(1); }
                    50% { transform: scale(1.02); }
                    100% { transform: scale(1); }
                }
                .latido-premio {
                    display: block;
                    animation: latidoCheckout 1.5s ease-in-out infinite;
                }
            </style>`;

            // 1. Mostrar descuento de porcentaje si tiene
            if (descuentoPorcentaje > 0) {
                html += `
                    <li style="border-bottom: none; margin-top: 15px; color: #2e7d32; font-weight: 600; background: #f0fdf4; padding: 10px; border-radius: 8px; border: 1px dashed #2e7d32;">
                        🎁 Cupón Aplicado (${textoCupon})
                        <span style="float:right;">-$${montoDescuento.toLocaleString('es-AR')}</span>
                    </li>
                `;
            } 
            // 2. Mostrar Envío Gratis de la Ruleta
            else if (textoCupon === "Envío Gratis") {
                html += `
                    <li style="border-bottom: none; margin-top: 15px; color: #2e7d32; font-weight: 600; background: #f0fdf4; padding: 10px; border-radius: 8px; border: 1px dashed #2e7d32;">
                        🚚 Premio Ruleta: Envío Gratis
                        <span style="float:right;">¡Bonificado!</span>
                    </li>
                `;
            } 
           // 3. Mostrar Envío VIP LATIENDO en VERDE si está en su segunda visita
            else if (promoVIPActiva) {
                html += `
                    <li class="latido-premio" style="border-bottom: none; margin-top: 15px; color: #2e7d32; font-weight: 700; background: #f0fdf4; padding: 10px; border-radius: 8px; border: 1px solid #2e7d32; box-shadow: 0 4px 10px rgba(46, 125, 50, 0.2);">
                        👑 ¡Beneficio VIP: 🚚 Envío GRATIS Activado!
                        <span style="float:right; color: #111;"></span>
                    </li>
                `;
            }

            html += `</ul>`;
            
            // Línea de Total Final (Si hay descuento, tachamos el original)
            let textoTotal = "";
            if (descuentoPorcentaje > 0) {
                textoTotal = `
                    <div style="text-align: right; color: #888; text-decoration: line-through; font-size: 0.9em;">Subtotal: $${total.toLocaleString('es-AR')}</div>
                    <div style="font-size: 1.5em; font-weight: 700; color: #2e7d32;">$${totalConDescuentoGlobal.toLocaleString('es-AR')}</div>
                `;
            } else {
                textoTotal = `<span style="font-size: 1.5em; font-weight: 700; color: #111;">$${totalConDescuentoGlobal.toLocaleString('es-AR')}</span>`;
            }

            html += `
                <div style="margin-top: 20px; padding-top: 15px; border-top: 2px solid #111;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 1.1em; font-weight: 500;">Total a pagar:</span>
                        <div style="text-align:right;">${textoTotal}</div>
                    </div>
                </div>
            `;

            resumenDiv.innerHTML = html;
        }

        async function actualizarStockEnBaseDeDatos() {
            for (const p of carrito) {
                const p_id = p.id.trim(); 
                const p_talle = p.talla.trim(); 
                const p_color = p.color.trim();
                const p_cantidad = Number(p.cantidad);

                try {
                    const { data: variantes, error: varError } = await _supabase
                        .from('productos_variantes')
                        .select('id, stock')
                        .eq('producto_id', p_id) 
                        .ilike('talle', p_talle)
                        .ilike('color', p_color);

                    if (!varError && variantes && variantes.length > 0) {
                        const variante = variantes[0]; 
                        const nuevoStockVariante = variante.stock - p_cantidad;
                        await _supabase.from('productos_variantes').update({ stock: nuevoStockVariante }).eq('id', variante.id);
                    }

                    const { data: producto, error: prodError } = await _supabase
                        .from('productos')
                        .select('id, stock')
                        .eq('id', p_id);

                    if (!prodError && producto && producto.length > 0) {
                        const prodPrincipal = producto[0];
                        const nuevoStockPrincipal = prodPrincipal.stock - p_cantidad;
                        await _supabase.from('productos').update({ stock: nuevoStockPrincipal }).eq('id', prodPrincipal.id);
                    }
                } catch (error) {
                    console.error(`Error de stock:`, error);
                }
            }
        }

      document.querySelector('#formulario-pedido').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const metodoTexto = "Mercado Pago"; 
            const nombre = document.querySelector('#nombre').value.trim();
            const direccionCalle = document.querySelector('#direccion').value.trim();
            const localidad = document.querySelector('#localidad').value.trim();
            const cp = document.querySelector('#cp').value.trim();
            const provinciaSelect = document.querySelector('#provincia');
            const provinciaTexto = provinciaSelect.options[provinciaSelect.selectedIndex].text;
            const codArea = document.querySelector('#cod-area').value.trim();
            const celular = document.querySelector('#celular').value.trim();
            const telefonoCompleto = codArea + " " + celular;
            
            // Usamos el total global que ya tiene el descuento aplicado
            const totalFinal = totalConDescuentoGlobal;

            const btn = document.querySelector('#boton-accion');
            btn.disabled = true;
            btn.innerHTML = "Procesando...";

            // 1. GUARDAMOS LOS DATOS TEMPORALMENTE
            const datosVenta = {
                nombre, direccionCalle, localidad, provinciaTexto, cp, telefonoCompleto, metodoTexto, totalCalculado: totalFinal
            };
            localStorage.setItem('datos_venta_gruken', JSON.stringify(datosVenta));

            // 2. EJECUTAMOS MERCADO PAGO
            ejecutarMercadoPago();
        });

        async function registrarVenta(nombre, direccion, localidad, provincia, cp, celular, metodo, totalVenta) {
            const { error } = await _supabase
                .from('ventas')
                .insert([{
                    cliente: nombre,
                    direccion: direccion,
                    localidad: localidad,
                    provincia: provincia,
                    codigo_postal: cp,
                    celular: celular,
                    metodo_pago: metodo,
                    total: totalVenta,
                    articulos: carrito
                }]);

            if (error) console.error("Error al registrar venta:", error);
        }

        async function ejecutarMercadoPago() {
            const btn = document.querySelector('#boton-accion');
            const nombreFull = document.querySelector('#nombre').value.split(' ');
            const emailVal = document.querySelector('#email').value;
            btn.innerHTML = "Conectando con Mercado Pago...";

            const compradorInfo = {
              email: emailVal,
              nombre: nombreFull[0] || "Cliente",
              apellido: nombreFull[1] || "Gruken" 
            };

            // === EL TRUCO PARA MERCADO PAGO ===
            // Como Mercado Pago calcula el total sumando el precio de cada item, 
            // tenemos que mandarle los items "rebajados" si hay un cupón.
            
            let cupon = localStorage.getItem('gruken_cupon') || "";
            let descuentoPorcentaje = 0;
            if (cupon === "GRUKEN15") descuentoPorcentaje = 0.15;
            else if (cupon === "GRUKEN10") descuentoPorcentaje = 0.10;

            let carritoConDescuento = carrito;
            
            if (descuentoPorcentaje > 0) {
                // Si hay descuento, le aplicamos la rebaja a cada producto antes de mandarlo a MP
                carritoConDescuento = carrito.map(p => {
                    let precioOriginal = parseInt(p.precio);
                    let precioRebajado = precioOriginal - (precioOriginal * descuentoPorcentaje);
                    return { ...p, precio: precioRebajado.toString() };
                });
            }

            try {
                const response = await fetch('/api/crear-preferencia', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Mandamos el carrito ya rebajado para que no cobren de más
                    body: JSON.stringify({ items: carritoConDescuento, comprador: compradorInfo })
                });

                if (!response.ok) throw new Error("Error conectando con Mercado Pago");

                const data = await response.json();
                if (data.id) {
                    mp.checkout({
                        preference: { id: data.id },
                        autoOpen: true
                    });
                }
            } catch (error) {
                alert("Hubo un problema: " + error.message);
                btn.disabled = false;
                btn.innerHTML = "Reintentar Pago";
            }
        }
    </script>
</body>
</html>
