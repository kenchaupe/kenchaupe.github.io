<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - Gruken</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    
    <style>
        .checkout-container { max-width: 800px; margin: 50px auto; padding: 20px; font-family: Arial, sans-serif; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .resumen-pedido { background: #f9f9f9; padding: 20px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #eee; }
        .resumen-pedido h3 { margin-top: 0; color: #333; }
        .resumen-pedido ul { list-style: none; padding: 0; }
        .resumen-pedido li { margin-bottom: 8px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
        
        .btn-confirmar { 
            background-color: #25d366; 
            color: white; 
            padding: 15px 20px; 
            border: none; 
            width: 100%; 
            cursor: pointer; 
            font-size: 1.1em; 
            font-weight: bold; 
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-confirmar:hover { opacity: 0.9; }
        .btn-confirmar:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-mp { background-color: #009ee3; } 
        #walletPoint { margin-top: 15px; }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>Finalizar Pedido</h1>
        
        <div class="resumen-pedido" id="resumen-final">
            </div>
        
        <form id="formulario-pedido">
            <div class="form-group">
                <label>Nombre Completo:</label>
                <input type="text" id="nombre" required placeholder="Ej: Ruben .G">
            </div>
            <div class="form-group">
                <label>Dirección de Entrega:</label>
                <input type="text" id="direccion" required placeholder="Ej: av.rivadavia 123 - buenos aires">
            </div>
            <div class="form-group">
                <label>Método de Pago:</label>
                <select id="pago" onchange="actualizarBoton()">
                    <option value="WhatsApp">Pago en efectivo / Retiro en persona</option>
                    <option value="MercadoPago">Tarjeta de Crédito / Débito (Mercado Pago)</option>
                </select>
            </div>

            <button type="submit" id="boton-accion" class="btn-confirmar">
                Enviar Pedido por WhatsApp
            </button>

            <div id="walletPoint"></div>
        </form>
    </div>

    <script>
        const supabaseUrl = 'https://pvniwivsxluujijyqqpc.supabase.co';
        const supabaseKey = 'sb_publishable_ss0VcJwu1wR5OVrNn2aYUw_sGG4HiJh';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
                      // PASO 1: CAMBIAR PUBLIC KEY DE MERCADOPAGO.
        const mp = new MercadoPago('APP_USR-790c84f2-956e-4fc8-ab25-bbaed5aea23b', {
            locale: 'es-AR'
        });

        const resumenDiv = document.querySelector('#resumen-final');
        let carrito = JSON.parse(localStorage.getItem('carrito_gruken')) || [];
        let total = 0;

        document.addEventListener('DOMContentLoaded', () => {
            renderizarResumen();
        });

        function renderizarResumen() {
            if(carrito.length === 0) {
                resumenDiv.innerHTML = "<p>Tu carrito está vacío. <a href='index.html'>Volver a la tienda</a></p>";
                document.querySelector('#boton-accion').disabled = true;
                return;
            }

            total = 0;
            let html = `<h3>Detalle de tu compra:</h3><ul>`;
            carrito.forEach(p => {
                const subtotal = parseInt(p.precio) * p.cantidad;
                html += `<li>- ${p.titulo} | Color: ${p.color} | Talle: ${p.talla} | Cantidad: ${p.cantidad} | $${subtotal.toLocaleString('es-AR')}</li>`;
                total += subtotal;
            });
            html += `</ul><p style="font-size: 1.2em;"><strong>TOTAL: $${total.toLocaleString('es-AR')}</strong></p>`;
            resumenDiv.innerHTML = html;
        }

        function actualizarBoton() {
            const metodo = document.querySelector('#pago').value;
            const btn = document.querySelector('#boton-accion');
            
            if(metodo === "MercadoPago") {
                btn.innerHTML = "Pagar con Mercado Pago";
                btn.classList.add('btn-mp');
            } else {
                btn.innerHTML = "Enviar Pedido por WhatsApp";
                btn.classList.remove('btn-mp');
            }
        }
async function actualizarStockEnBaseDeDatos() {
    for (const p of carrito) {
        // Aseguramos los datos que vienen del carrito
        const p_id = p.id.trim(); 
        const p_talle = p.talla.trim(); 
        const p_color = p.color.trim();
        const p_cantidad = Number(p.cantidad);

        try {
            // PASO 1: Descontar de la tabla de VARIANTES (productos_variantes)
            // CAMBIO CLAVE: Usamos .eq en lugar de .ilike para los IDs
            const { data: variantes, error: varError } = await _supabase
                .from('productos_variantes')
                .select('id, stock')
                .eq('producto_id', p_id) 
                .ilike('talle', p_talle)
                .ilike('color', p_color);

            if (varError) {
                console.error(`Error buscando variante de ${p.titulo}:`, varError);
            } else if (variantes && variantes.length > 0) {
                const variante = variantes[0]; 
                const nuevoStockVariante = variante.stock - p_cantidad;
                
                // CAMBIO CLAVE: Capturamos el error al intentar actualizar
                const { error: errorUpdateVar } = await _supabase
                    .from('productos_variantes')
                    .update({ stock: nuevoStockVariante })
                    .eq('id', variante.id);
                    
                if (errorUpdateVar) {
                    console.error("Supabase rechazó actualizar la variante (¿Falta permiso RLS?):", errorUpdateVar);
                }
            }

            // PASO 2: Descontar de la tabla PRINCIPAL (productos)
            const { data: producto, error: prodError } = await _supabase
                .from('productos')
                .select('id, stock')
                .eq('id', p_id); // CAMBIO CLAVE: .eq en lugar de .ilike

            if (prodError) {
                console.error(`Error buscando producto principal ${p.titulo}:`, prodError);
            } else if (producto && producto.length > 0) {
                const prodPrincipal = producto[0];
                const nuevoStockPrincipal = prodPrincipal.stock - p_cantidad;
                
                const { error: errorUpdateProd } = await _supabase
                    .from('productos')
                    .update({ stock: nuevoStockPrincipal })
                    .eq('id', prodPrincipal.id);
                    
                if (errorUpdateProd) {
                    console.error("Supabase rechazó actualizar el producto principal:", errorUpdateProd);
                } else {
                    console.log(`✅ Stock descontado exitosamente en BD para: ${p.titulo}`);
                }
            }

        } catch (error) {
            console.error(`Error crítico en la función para ${p.titulo}:`, error);
        }
    }
}
        document.querySelector('#formulario-pedido').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const metodoSelect = document.querySelector('#pago');
            const metodoTexto = metodoSelect.options[metodoSelect.selectedIndex].text;
            const nombre = document.querySelector('#nombre').value;
            const direccion = document.querySelector('#direccion').value;
            
            // CORRECCIÓN: Usar la variable "carrito" (no articulosCarrito)
            const totalCalculado = carrito.reduce((acc, p) => acc + (parseInt(p.precio) * p.cantidad), 0);

            // Bloquear botón para evitar clics dobles
            const btn = document.querySelector('#boton-accion');
            btn.disabled = true;
            btn.innerHTML = "Procesando pedido...";

            // 1. REGISTRAMOS LA VENTA
            await registrarVenta(nombre, direccion, metodoTexto, totalCalculado);
            
            // 2. ACTUALIZAMOS EL STOCK EN SUPABASE
            await actualizarStockEnBaseDeDatos();
            
            if (metodoSelect.value === "WhatsApp") {
                enviarPorWhatsApp(nombre, direccion, metodoTexto, totalCalculado);
            } else {
                ejecutarMercadoPago();
            }
        });

        // CORRECCIÓN: Recibir el total calculado como parámetro
        function enviarPorWhatsApp(nombre, direccion, metodo, totalCalc) {
            let mensaje = `*Hola Gruken! Este es mi pedido:*\n`;
            mensaje += `*Nombre:* ${nombre}\n`;
            mensaje += `*Dirección:* ${direccion}\n`;
            mensaje += `*Metodo de pago:* ${metodo}\n\n`;
            mensaje += `*Productos:*\n`;
            
            carrito.forEach(p => {
                mensaje += `- ${p.titulo} | Color: ${p.color} | Talle: ${p.talla} | Cantidad: ${p.cantidad} | $${(parseInt(p.precio) * p.cantidad).toLocaleString('es-AR')}\n`;
            });
            
            mensaje += `\n*TOTAL: $${totalCalc.toLocaleString('es-AR')}*`;

            const url = `https://api.whatsapp.com/send?phone=5491130103905&text=${encodeURIComponent(mensaje)}`;
            
            // Abrir WhatsApp
            window.open(url, '_blank');
            
            // Limpiar el carrito DESPUÉS de enviar con éxito
            localStorage.removeItem('carrito_gruken');
            alert("¡Pedido enviado! Muchas gracias.");
            window.location.href = "index.html"; 
        }
        
        async function registrarVenta(nombre, direccion, metodo, totalVenta) {
            const { error } = await _supabase
                .from('ventas')
                .insert([{
                    cliente: nombre,
                    direccion: direccion,
                    metodo_pago: metodo,
                    total: totalVenta,
                    articulos: carrito // Guardamos todo el array de productos
                }]);

            if (error) console.error("Error al registrar venta:", error);
        }

      async function ejecutarMercadoPago() {
            const btn = document.querySelector('#boton-accion');
            btn.innerHTML = "Conectando...";
            btn.disabled = true;

            try {
                // Volvemos a apuntar a tu carpeta local/Vercel
                const response = await fetch('/api/crear-preferencia', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ items: carrito })
                });

                if (!response.ok) throw new Error("Error en el servidor al conectar con Mercado Pago");

                const data = await response.json();
                if (data.id) {
                    mp.checkout({
                        preference: { id: data.id },
                        autoOpen: true
                    });
                }
            } catch (error) {
                alert("Hubo un problema: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Pagar con Mercado Pago";
            }
        }
    </script>
</body>
</html>
