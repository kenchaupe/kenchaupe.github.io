name: Bot de Actividad Infinita

on:
  schedule:
    # Se ejecuta el día 1 de cada mes a las 00:00
    - cron: '0 0 1 * *'
  workflow_dispatch: # Permite ejecutarlo manual para probar

jobs:
  actualizar-actividad:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Realizar cambio de actividad
        run: |
          echo "Ultima actividad automatica: $(date)" > actividad_bot.txt
          
      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name "Gruken Bot"
          git config --global user.email "bot@gruken.com"
          git add actividad_bot.txt
          git commit -m "Auto-update: Manteniendo GitHub y Supabase despiertos"
          git push