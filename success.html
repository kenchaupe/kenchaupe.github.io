<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso! - Gruken</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .card { max-width: 400px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .icon { font-size: 50px; color: #25d366; }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; line-height: 1.5; }
        a { color: #009ee3; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✔</div>
        <h1 id="titulo-estado">Procesando tu compra...</h1>
        <p id="mensaje-estado">Aguardá unos segundos, estamos registrando tu pedido y preparando todo. Por favor no cierres esta ventana.</p>
    </div>

    <script>
        // 1. CONEXIÓN A SUPABASE
        const supabaseUrl = 'https://pvniwivsxluujijyqqpc.supabase.co';
        const supabaseKey = 'sb_publishable_ss0VcJwu1wR5OVrNn2aYUw_sGG4HiJh';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function finalizarVenta() {
            // Recuperamos el carrito y los datos del cliente
            let carrito = JSON.parse(localStorage.getItem('carrito_gruken'));
            let datosVenta = JSON.parse(localStorage.getItem('datos_venta_gruken'));

            // Prevenir errores si recargan la página o si no hay datos
            if (!carrito || !datosVenta || carrito.length === 0) {
                mostrarMensajeFinal();
                return;
            }

            // 2. REGISTRAMOS LA VENTA EN LA BASE DE DATOS
            const { error: errorVenta } = await _supabase.from('ventas').insert([{
                cliente: datosVenta.nombre,
                direccion: datosVenta.direccionCalle,
                localidad: datosVenta.localidad,
                provincia: datosVenta.provinciaTexto,
                codigo_postal: datosVenta.cp,
                celular: datosVenta.telefonoCompleto,
                metodo_pago: datosVenta.metodoTexto,
                total: datosVenta.totalCalculado,
                articulos: carrito
            }]);

            if (errorVenta) console.error("Error al registrar venta:", errorVenta);

            // 3. DESCONTAMOS EL STOCK REAL
            for (const p of carrito) {
                const p_id = p.id.trim(); 
                const p_talle = p.talla.trim(); 
                const p_color = p.color.trim();
                const p_cantidad = Number(p.cantidad);

                try {
                    // Descontar variantes
                    const { data: variantes } = await _supabase.from('productos_variantes')
                        .select('id, stock').eq('producto_id', p_id).ilike('talle', p_talle).ilike('color', p_color);
                    
                    if (variantes && variantes.length > 0) {
                        await _supabase.from('productos_variantes').update({ stock: variantes[0].stock - p_cantidad }).eq('id', variantes[0].id);
                    }

                    // Descontar principal
                    const { data: producto } = await _supabase.from('productos').select('id, stock').eq('id', p_id);
                    if (producto && producto.length > 0) {
                        await _supabase.from('productos').update({ stock: producto[0].stock - p_cantidad }).eq('id', producto[0].id);
                    }
                } catch (error) {
                    console.error("Error de stock:", error);
                }
            }

            // 4. BORRAMOS LOS DATOS PARA EVITAR DUPLICADOS SI RECARGAN LA PÁGINA
            localStorage.removeItem('carrito_gruken');
            localStorage.removeItem('datos_venta_gruken');

            // 5. AVISAMOS QUE SALIÓ TODO BIEN
            mostrarMensajeFinal();
        }

        function mostrarMensajeFinal() {
            document.getElementById('titulo-estado').innerText = "¡Pago Exitoso!";
            document.getElementById('mensaje-estado').innerHTML = "¡Gracias por tu compra! Tu pedido fue registrado correctamente.<br><br>En breve serás redireccionado a la tienda.<br>Si no ocurre automáticamente, <a href='index.html'>haz clic aquí</a>.";
            
            // Redirección después de 5 segundos
            setTimeout(() => {
                window.location.href = "index.html";
            }, 5000);
        }

        // Ejecutar el proceso al abrir la página
        finalizarVenta();
    </script>
</body>
</html>
